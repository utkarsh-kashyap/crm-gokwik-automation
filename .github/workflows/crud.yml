name: CRUD Sanity

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: false
        default: 'qa'
        type: choice
        options:
          - qa

jobs:
  crud-sanity:
    name: CRUD Sanity — Login · Create · Update · Delete
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run CRUD sanity tests
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          LOGIN_EMAIL:    ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_OTP:      ${{ secrets.LOGIN_OTP }}
          MERCHANT_ID:    ${{ secrets.MERCHANT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEADLESS:       true
          SLOW_MO:        0
        run: |
          npx playwright test \
            --grep "TC_AUTH_001|TC_PRD_CREATE_001|TC_PRD_UPDATE_001|TC_PRD_DELETE_001" \
            --workers=1 \
            --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crud-playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crud-failure-artifacts
          path: test-results/
          retention-days: 7