name: Regression Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: false
        default: 'qa'
        type: choice
        options:
          - qa
      run_cucumber:
        description: 'Run Cucumber BDD suite as well?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  regression:
    name: Regression — Playwright + Cucumber
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright regression suite
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          LOGIN_EMAIL:    ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_OTP:      ${{ secrets.LOGIN_OTP }}
          MERCHANT_ID:    ${{ secrets.MERCHANT_ID }}
          HEADLESS:       true
          SLOW_MO:        0
          CI:             true
        run: |
          npx playwright test \
            --workers=1 \
            --reporter=list

      - name: Run Cucumber BDD suite
        if: ${{ github.event.inputs.run_cucumber == 'true' }}
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          LOGIN_EMAIL:    ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_OTP:      ${{ secrets.LOGIN_OTP }}
          MERCHANT_ID:    ${{ secrets.MERCHANT_ID }}
          HEADLESS:       true
          SLOW_MO:        0
          CI:             true
        run: npm run cucumber

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Cucumber report
        if: always() && ${{ github.event.inputs.run_cucumber == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-cucumber-report
          path: reports/cucumber-report.html
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-results
          path: allure-results/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-artifacts
          path: test-results/
          retention-days: 7