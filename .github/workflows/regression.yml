name: Regression Suite

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test tag to run (e.g. @products, @auth). Leave empty for full suite.'
        required: false
        default: ''

jobs:
  regression:
    name: Regression Tests (Playwright + Cucumber)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]  # Parallel sharding for speed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright regression (shard ${{ matrix.shard }}/2)
        run: |
          if [ -n "${{ github.event.inputs.tags }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.tags }}" --shard=${{ matrix.shard }}/2
          else
            npx playwright test --shard=${{ matrix.shard }}/2
          fi
        env:
          BASE_URL:          ${{ secrets.BASE_URL }}
          LOGIN_EMAIL:       ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD:    ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_OTP:         ${{ secrets.LOGIN_OTP }}
          MERCHANT_ID:       ${{ secrets.MERCHANT_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          HEADLESS:          true
          CI:                true

      - name: Run Cucumber BDD suite
        if: matrix.shard == 1  # Only run Cucumber on one shard
        run: npm run cucumber
        env:
          BASE_URL:          ${{ secrets.BASE_URL }}
          LOGIN_EMAIL:       ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD:    ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_OTP:         ${{ secrets.LOGIN_OTP }}
          MERCHANT_ID:       ${{ secrets.MERCHANT_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          HEADLESS:          true
          CI:                true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 14

      - name: Upload Cucumber report
        uses: actions/upload-artifact@v4
        if: always() && matrix.shard == 1
        with:
          name: cucumber-report
          path: reports/cucumber-report.html
          retention-days: 14

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifacts-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
